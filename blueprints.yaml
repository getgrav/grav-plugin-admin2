name: Admin Pro
slug: admin-pro
type: plugin
version: 2.0.0-alpha.1
description: Modern administration panel for Grav CMS. A premium, redesigned admin experience.
icon: black-tie
author:
  name: Trilby Media
  email: hello@trilby.media
  url: https://trilby.media
homepage: https://getgrav.org/premium/admin-pro
keywords: admin, panel, dashboard, management, pro, premium
bugs: https://github.com/getgrav/grav-plugin-admin-pro/issues
docs: https://learn.getgrav.org/admin-pro
license: proprietary
premium: true

dependencies:
  - { name: grav, version: '>=1.8.0' }
  - { name: api, version: '>=1.0.0' }

form:
  validation: loose
  fields:
    enabled:
      type: toggle
      label: Plugin Status
      highlight: 1
      default: 1
      options:
        1: Enabled
        0: Disabled
      validate:
        type: bool

    route:
      type: text
      label: Admin Route
      description: The route to access Admin Pro (relative to site root).
      default: /admin-pro
      placeholder: /admin-pro
