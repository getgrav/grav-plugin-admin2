# ترجمات واجهة Admin2 (admin-next).
#
# جميع المفاتيح الخاصة بـ admin-next تعيش تحت كتلة ICU الجذرية. قد تستخدم القيم
# صياغة ICU MessageFormat للعناصر النائبة والجموع وحالات select — حيث يمرر
# admin-next قيم ICU.* عبر @formatjs/intl-messageformat.
#
# المفاتيح العادية (غير ICU) التي لا تحتوي على بادئة ICU في البداية يتم البحث
# عنها بواسطة admin-next كحل احتياطي للسلاسل القديمة (وتبقى الشيء الوحيد
# الذي تراه واجهة admin القديمة / Grav 1).
#
# الاصطلاح: ابقِ المفاتيح مجمّعة حسب القسم ومرتّبة أبجدياً داخل القسم
# حيثما كان ذلك مناسباً. استخدم ADMIN_NEXT.* للمفاتيح الخاصة بالواجهة الجديدة.

