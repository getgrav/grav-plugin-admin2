# תרגומי ממשק המשתמש של Admin2 (admin-next).
#
# כל המפתחות המיוחדים ל-admin-next נמצאים תחת בלוק השורש ICU. הערכים יכולים
# להשתמש בתחביר ICU MessageFormat עבור placeholders, ריבוי וצורות בחירה —
# admin-next מעביר ערכי ICU.* דרך @formatjs/intl-messageformat.
#
# מפתחות רגילים (לא ICU) ללא קידומת ICU מובילה מחפשים על ידי
# admin-next כ-fallback למחרוזות מהדור הקודם (וממשיכים להיות
# הדבר היחיד ש-admin הישן / Grav 1 רואים).
#
# מוסכמה: שמור על קיבוץ מפתחות לפי מקטעים ומסודרים אלפביתית בתוך
# מקטע כאשר זה סביר. השתמש ב-ADMIN_NEXT.* עבור מפתחות ספציפיים
# לממשק החדש.

